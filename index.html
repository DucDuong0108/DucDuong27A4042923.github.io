<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Lập GMAIL HVNH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="student-card">
            
            <div class="form-section">
                <div class="brand-header" style="text-align: center; margin-bottom: 20px;">
                    <img src="images.jpg" alt="Logo BAV" class="logo" style="width: 120px; height: auto; display: block; margin: 0 auto 10px auto;">
                    <h1>Lập GMAIL HVNH</h1>
                </div>

                <div class="input-group">
                    <label for="fullName">Họ và tên <span class="required">*</span></label>
                    <input type="text" id="fullName" placeholder="VD: Nguyen Anh Dung (không dấu)">
                </div>

                <div class="input-group">
                    <label for="studentId">Mã sinh viên <span class="required">*</span></label>
                    <input type="text" id="studentId" placeholder="VD: 27A4082919">
                </div>

                <button onclick="xuLyThongTin()" class="btn-lookup">
                    <span class="btn-text">Tra cứu ngay</span>
                    <span class="loader" id="btnLoader"></span>
                </button>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-header">
                    <h2>Kết quả</h2>
                    <button onclick="dongKetQua()" class="btn-close">&times;</button>
                </div>
                
                <div id="display" class="info-text">
                </div>
            </div>

        </div>
    </div>

    <script>
        async function xuLyThongTin() {
            // 1. Khai báo các phần tử UI
            const fullNameInputPart = document.getElementById("fullName");
            const studentIdInputPart = document.getElementById("studentId");
            const resultSection = document.getElementById("resultSection");
            const displayDiv = document.getElementById("display");
            const btnLoader = document.getElementById("btnLoader");

            const fullName = fullNameInputPart.value.trim();
            const studentId = studentIdInputPart.value.trim();

            // 2. Kiểm tra nhập liệu cơ bản
            if (!fullName || !studentId) {
                alert("Vui lòng nhập đầy đủ Họ tên và Mã sinh viên!");
                fullNameInputPart.focus();
                return;
            }

            // 3. Hiệu ứng đang tải
            btnLoader.style.display = "inline-block";
            displayDiv.innerHTML = "";
            resultSection.style.display = "none";

            // --- Logic xử lý (giữ nguyên từ bản trước) ---
            const parts = fullName.toLowerCase().split(/\s+/); 
            const firstName = parts[parts.length - 1]; 
            let initials = "";
            for (let i = 0; i < parts.length - 1; i++) {
                if(parts[i][0]) initials += parts[i][0]; 
            }
            const email = `${initials}${firstName}.${studentId.toLowerCase()}@hvnh.edu.vn`;
            const coursePeriod = studentId.substring(0, 2); 
            const facultyCode = studentId.substring(3, 6);
            let faculty = "Chưa xác định";

            try {
                // Giả định file MSV.txt nằm cùng thư mục
                const response = await fetch('MSV.txt');
                if (!response.ok) throw new Error("Không thể tải file MSV.txt");
                const text = await response.text();
                const lines = text.split('\n');
                const facultyMap = {};
                lines.forEach(line => {
                    const cleanLine = line.trim();
                    if (cleanLine.includes('-')) {
                        const firstDash = cleanLine.indexOf('-');
                        const code = cleanLine.substring(0, firstDash).replace(/[^0-9]/g, ''); 
                        const name = cleanLine.substring(firstDash + 1).trim();
                        if (code) facultyMap[code] = name;
                    }
                });
                if (facultyMap[facultyCode]) faculty = facultyMap[facultyCode];
            } catch (error) {
                console.error(error);
                faculty = "Lỗi đọc dữ liệu khoa";
            }

            const lastFour = studentId.slice(-4); 
            let sum = 0;
            if (!isNaN(lastFour) && lastFour.length === 4) {
                sum = lastFour.split('').reduce((total, num) => total + parseInt(num), 0);
            } else {
                sum = "(MSV không hợp lệ)";
            }
            // --- Hết Logic xử lý ---

            // 4. Hiển thị kết quả đẹp mắt
            setTimeout(() => { // Tạo độ trễ giả lập để thấy hiệu ứng loading
                btnLoader.style.display = "none";
                resultSection.style.display = "block"; // Hiện phần kết quả
                
                displayDiv.innerHTML = `
                    <div class="result-item email-item">
                        <label>Email Sinh viên:</label>
                        <span class="email-box">${email}</span>
                    </div>
                    <div class="result-item">
                        <p>Xin chào <b class="highlight">${fullName}</b>,</p>
                        <p>Bạn thuộc Khóa <b class="highlight">${coursePeriod}</b>, Khoa: <b class="highlight-faculty">${faculty}</b>.</p>
                    </div>
                    <div class="result-item sum-item">
                        <label>Tổng 4 số cuối MSV:</label>
                        <span class="sum-number">${sum}</span>
                    </div>
                `;
            }, 800);
        }

        function dongKetQua() {
            document.getElementById("resultSection").style.display = "none";
        }
    </script>
</body>
</html>
